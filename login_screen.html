<!DOCTYPE html>

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            font-family: theme('fontFamily.body');
        }
        .bg-noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");

<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden bg-background">
<!-- Background Texture & Gradient -->
<div class="absolute inset-0 bg-diagonal-grid pointer-events-none"></div>
<div class="absolute inset-0 bg-noise pointer-events-none mix-blend-overlay"></div>
<div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-br from-primary/10 to-transparent pointer-events-none opacity-50"></div>
<!-- Main Content Container -->
<main class="w-full max-w-md px-6 py-12 relative z-10 flex flex-col items-center">
<!-- Logo & Wordmark Area (Scoreboard Style) -->
<div class="mb-12 flex flex-col items-center text-center">
<div class="w-20 h-20 mb-4 bg-surface-container-high rounded-full flex items-center justify-center border border-outline-variant/15 shadow-[0px_24px_48px_rgba(0,0,0,0.4)]">
<span class="material-symbols-outlined text-5xl text-primary font-bold" style="font-variation-settings: 'FILL' 1;">
                    sports_soccer
                </span>
</div>
<h1 class="font-headline font-black text-5xl tracking-tighter text-on-background uppercase mb-2">
                PREDICTOR <span class="text-primary block">WC26</span>
</h1>
<p class="font-label text-sm uppercase tracking-[0.2em] text-on-surface-variant font-bold">
                Predict. Compete. Win. 🏆
            </p>
</div>
<!-- Login Form Container (Glassmorphism) -->
<div class="w-full bg-surface-container-low/80 backdrop-blur-md rounded-xl p-8 shadow-[0px_24px_48px_rgba(0,0,0,0.6)] border border-outline-variant/15">
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div>
<label class="block font-label text-xs font-bold text-on-surface-variant mb-2 uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">mail</span>
</div>
<input class="block w-full pl-10 bg-surface-container-highest border-transparent rounded text-on-surface font-body text-base focus:border-outline focus:ring-0 focus:bg-surface-container-highest transition-colors placeholder:text-on-surface-variant/50 py-3" id="email" name="email" placeholder="enter@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<label class="block font-label text-xs font-bold text-on-surface-variant mb-2 uppercase tracking-wider" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">lock</span>
</div>
<input class="block w-full pl-10 pr-10 bg-surface-container-highest border-transparent rounded text-on-surface font-body text-base focus:border-outline focus:ring-0 focus:bg-surface-container-highest transition-colors placeholder:text-on-surface-variant/50 py-3" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
<div class="flex justify-end mt-2">
<a class="font-label text-xs text-on-surface-variant hover:text-primary transition-colors" href="#">Lupa password?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-headline font-bold uppercase text-lg py-4 rounded shadow-[0_0_15px_rgba(63,255,139,0.2)] hover:shadow-[0_0_25px_rgba(63,255,139,0.4)] transition-all active:scale-[0.98] mt-4 flex justify-center items-center gap-2" type="submit">
                    MASUK
                    <span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</form>
<!-- Quick Login / Social (Editorial Flair) -->
<div class="mt-8 pt-6 border-t border-outline-variant/20 text-center">
<p class="font-label text-xs text-on-surface-variant mb-4 uppercase tracking-widest">Or continue with</p>
<div class="flex justify-center gap-4">
<button class="w-12 h-12 bg-surface-container-highest rounded flex items-center justify-center hover:bg-surface-variant transition-colors group" type="button">
<span class="material-symbols-outlined text-on-surface group-hover:text-primary transition-colors">g_mobiledata</span>
</button>
<button class="w-12 h-12 bg-surface-container-highest rounded flex items-center justify-center hover:bg-surface-variant transition-colors group" type="button">
<span class="material-symbols-outlined text-on-surface group-hover:text-primary transition-colors">ios</span>
</button>
</div>
</div>
</div>
<!-- Decorative Elements -->
<div class="absolute bottom-4 left-4 text-outline-variant/30 font-headline text-[10rem] font-black leading-none pointer-events-none select-none z-0 -rotate-12 translate-y-1/4 -translate-x-1/4">
            W
        </div>
<div class="absolute top-4 right-4 text-outline-variant/30 font-headline text-[8rem] font-black leading-none pointer-events-none select-none z-0 rotate-12 -translate-y-1/4 translate-x-1/4">
            26
        </div>
